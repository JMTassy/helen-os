<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELEN OS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
}
a { color: #58a6ff; }
.container { max-width: 640px; width: 100%; }

/* Header */
.header {
  text-align: center;
  margin-bottom: 2rem;
}
.avatar { font-size: 4rem; line-height: 1; }
.name { font-size: 1.5rem; font-weight: 600; color: #e6edf3; margin: 0.5rem 0 0.25rem; }
.tagline { font-size: 0.85rem; color: #8b949e; }
.greeting {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  font-size: 0.9rem;
  color: #e6edf3;
}

/* State */
.section-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8b949e;
  margin: 1.5rem 0 0.5rem;
  border-bottom: 1px solid #21262d;
  padding-bottom: 0.25rem;
}
.state-grid {
  display: grid;
  gap: 0.5rem;
}
.state-row {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  font-size: 0.85rem;
}
.state-label { color: #8b949e; }
.state-value { color: #c9d1d9; text-align: right; max-width: 60%; }

/* Temple roles */
.roles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.5rem;
}
.role-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 0.6rem 0.75rem;
}
.role-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: #58a6ff;
  margin-bottom: 0.2rem;
}
.role-desc {
  font-size: 0.7rem;
  color: #8b949e;
  line-height: 1.3;
}

/* Chat */
.chat-area {
  margin-top: 1.5rem;
}
.messages {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
  max-height: 400px;
  overflow-y: auto;
}
.msg {
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  font-size: 0.85rem;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.msg.user {
  background: #1c2333;
  border: 1px solid #30363d;
  align-self: flex-end;
  max-width: 85%;
}
.msg.helen {
  background: #161b22;
  border: 1px solid #30363d;
  align-self: flex-start;
  max-width: 85%;
}
.msg .meta {
  font-size: 0.7rem;
  color: #8b949e;
  margin-top: 0.3rem;
}
.chat-input {
  display: flex;
  gap: 0.5rem;
}
.chat-input input {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  color: #c9d1d9;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
}
.chat-input input:focus { border-color: #58a6ff; }
.chat-input button {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
}
.chat-input button:hover { background: #30363d; }
.chat-input button:disabled { opacity: 0.5; cursor: default; }

.loading { color: #8b949e; font-size: 0.8rem; text-align: center; padding: 1rem; }
.error { color: #f85149; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar" id="avatar"></div>
    <div class="name" id="name">HELEN</div>
    <div class="tagline" id="tagline"></div>
    <div class="greeting" id="greeting"><span class="loading">Loading...</span></div>
  </div>

  <div class="section-title">State</div>
  <div class="state-grid" id="state"></div>

  <div class="section-title">Temple Roles</div>
  <div class="roles-grid" id="roles"></div>

  <div class="section-title">Chat</div>
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="Say something to HELEN..." autocomplete="off">
      <button id="send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let chatHistory = [];

async function loadBuddy() {
  try {
    const res = await fetch(API + '/buddy');
    const data = await res.json();
    const id = data.identity || {};
    const st = data.state || {};
    const temple = data.temple || {};

    document.getElementById('avatar').textContent = id.avatar_emoji || '';
    document.getElementById('name').textContent = id.full_name || id.name || 'HELEN';
    document.getElementById('tagline').textContent = id.tagline || '';
    document.getElementById('greeting').textContent = data.greeting || 'Welcome back.';

    const stateEl = document.getElementById('state');
    const rows = [
      ['Working thread', st.working_on],
      ['Topic', st.current_topic],
      ['Project', st.active_project],
      ['Tensions', st.tensions_count],
      ['Next action', st.next_action],
    ];
    stateEl.innerHTML = rows.map(([label, value]) =>
      '<div class="state-row"><span class="state-label">' + esc(label) + '</span><span class="state-value">' + esc(String(value || '—')) + '</span></div>'
    ).join('');

    const rolesEl = document.getElementById('roles');
    const roleDescs = id.temple_roles || {};
    const roleNames = temple.roles || Object.keys(roleDescs);
    rolesEl.innerHTML = roleNames.map(name =>
      '<div class="role-card"><div class="role-name">' + esc(name) + '</div><div class="role-desc">' + esc(roleDescs[name] || '') + '</div></div>'
    ).join('');
  } catch (e) {
    document.getElementById('greeting').innerHTML = '<span class="error">Failed to load: ' + esc(e.message) + '</span>';
  }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  addMessage(msg, 'user');
  chatHistory.push({ role: 'user', content: msg });

  const btn = document.getElementById('send');
  btn.disabled = true;

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-10) }),
    });
    const data = await res.json();
    if (data.error) {
      addMessage('Error: ' + data.error, 'helen error');
    } else {
      const meta = data.provider_name + ' | ' + data.elapsed_seconds + 's';
      addMessage(data.response, 'helen', meta);
      chatHistory.push({ role: 'assistant', content: data.response });
    }
  } catch (e) {
    addMessage('Network error: ' + e.message, 'helen error');
  }
  btn.disabled = false;
  input.focus();
}

function addMessage(text, cls, meta) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    el.appendChild(m);
  }
  const container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMessage();
});

loadBuddy();
</script>
</body>
</html>
