<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELEN OS — Companion</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Pro', -apple-system, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
.header { padding: 12px 20px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #ff6b4a, #e6edf3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #1a3a2a; color: #3fb950; }
.main { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 260px; border-right: 1px solid #21262d; padding: 16px; overflow-y: auto; }
.sidebar h3 { font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 8px; letter-spacing: 1px; }
.ctx-block { margin-bottom: 16px; }
.ctx-item { font-size: 13px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; }
.ctx-item.committed { border-left: 3px solid #3fb950; padding-left: 10px; }
.ctx-item.working { border-left: 3px solid #d29922; padding-left: 10px; }
.ctx-item.tension { border-left: 3px solid #f85149; padding-left: 10px; color: #f85149; }
.ctx-item .label { color: #8b949e; font-size: 11px; }
.chat-area { flex: 1; display: flex; flex-direction: column; }

/* --- AIRI Avatar --- */
.avatar-zone { display: flex; justify-content: center; align-items: center; padding: 24px 0 12px; flex-shrink: 0; }
.avatar {
  position: relative; width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, var(--avatar-glow), var(--avatar-core));
  box-shadow: 0 0 30px var(--avatar-glow), 0 0 60px var(--avatar-shadow);
  animation: breathe 4s ease-in-out infinite;
  transition: all 0.6s ease;
  cursor: default;
}
.avatar::after {
  content: ''; position: absolute; inset: -6px; border-radius: 50%;
  border: 1px solid var(--avatar-ring);
  opacity: 0.4; animation: ring-pulse 4s ease-in-out infinite;
}
.avatar.thinking {
  animation: think-pulse 1.2s ease-in-out infinite;
  box-shadow: 0 0 40px var(--avatar-glow), 0 0 80px var(--avatar-shadow);
}
.avatar-label {
  position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: #8b949e; letter-spacing: 2px; text-transform: uppercase;
  white-space: nowrap;
}

/* District color themes */
:root {
  --avatar-core: #1a1a2e;
  --avatar-glow: #ff6b4a;
  --avatar-shadow: rgba(255, 107, 74, 0.3);
  --avatar-ring: rgba(255, 107, 74, 0.5);
}
body.district-companion { --avatar-glow: #ff6b4a; --avatar-shadow: rgba(255,107,74,0.3); --avatar-ring: rgba(255,107,74,0.5); }
body.district-temple    { --avatar-glow: #a855f7; --avatar-shadow: rgba(168,85,247,0.3); --avatar-ring: rgba(168,85,247,0.5); }
body.district-oracle    { --avatar-glow: #38bdf8; --avatar-shadow: rgba(56,189,248,0.3); --avatar-ring: rgba(56,189,248,0.5); }
body.district-mayor     { --avatar-glow: #3fb950; --avatar-shadow: rgba(63,185,80,0.3); --avatar-ring: rgba(63,185,80,0.5); }

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.05); opacity: 1; }
}
@keyframes think-pulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.12); opacity: 1; }
}
@keyframes ring-pulse {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.08); }
}

/* --- Chat --- */
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.msg { margin-bottom: 16px; max-width: 80%; }
.msg.user { margin-left: auto; }
.msg.user .bubble { background: #1f6feb; border-radius: 16px 16px 4px 16px; padding: 10px 14px; }
.msg.assistant .bubble { background: #161b22; border: 1px solid #21262d; border-radius: 16px 16px 16px 4px; padding: 10px 14px; }
.msg .meta { font-size: 11px; color: #484f58; margin-top: 4px; }
.msg .bubble { word-wrap: break-word; overflow-wrap: break-word; }
.msg .bubble pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px; overflow-x: auto; margin: 8px 0; }
.msg .bubble code { font-family: 'SF Mono', monospace; font-size: 13px; }
.msg .bubble p { margin: 4px 0; }
.input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
.input-bar { padding: 12px 20px; border-top: 1px solid #21262d; display: flex; gap: 8px; }
.input-bar input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; color: #e6edf3; font-size: 14px; outline: none; }
.input-bar input:focus { border-color: #1f6feb; }
.input-bar button { background: #1f6feb; color: white; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 14px; }
.input-bar button:hover { background: #388bfd; }
.district-bar { display: flex; gap: 4px; margin-bottom: 12px; }
.district-btn { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; transition: all 0.3s; }
.district-btn.active { background: #1f6feb; color: white; border-color: #1f6feb; }
.district-btn:hover { border-color: #8b949e; }
.scroll-bottom { position: fixed; bottom: 80px; right: 30px; z-index: 100; display: none; }
.scroll-bottom button { background: #1f6feb; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; color: white; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
</style>
</head>
<body class="district-companion">

<div class="header">
  <h1>HELEN OS</h1>
  <span class="badge" id="status-badge">connecting...</span>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="district-bar">
      <button class="district-btn active" data-district="companion" onclick="switchDistrict('companion',this)">Companion</button>
      <button class="district-btn" data-district="temple" onclick="switchDistrict('temple',this)">Temple</button>
      <button class="district-btn" data-district="oracle" onclick="switchDistrict('oracle',this)">Oracle</button>
      <button class="district-btn" data-district="mayor" onclick="switchDistrict('mayor',this)">Mayor</button>
    </div>
    <div id="context-drawer">Loading context...</div>
  </div>
  <div class="chat-area">
    <div class="avatar-zone">
      <div class="avatar" id="avatar">
        <span class="avatar-label" id="avatar-label">companion</span>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="Talk to HELEN..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
<div class="scroll-bottom" id="scroll-btn"><button onclick="document.getElementById('messages').scrollTop=999999">↓</button></div>

<script>
const API = window.location.origin;
const SESSION_ID = 'airi-' + (localStorage.getItem('helen_session') || (() => { const s = Date.now().toString(36); localStorage.setItem('helen_session', s); return s; })());
let currentDistrict = 'companion';
let chatHistory = [];
const avatar = document.getElementById('avatar');
const avatarLabel = document.getElementById('avatar-label');

async function loadChatHistory() {
  try {
    const r = await fetch(API + '/conversations?session_id=' + SESSION_ID + '&limit=20');
    const d = await r.json();
    if (d.messages && d.messages.length) {
      for (const m of d.messages) {
        chatHistory.push({role: m.role, content: m.content});
        addMessage(m.role, m.content, m.role === 'assistant' ? `${m.provider || '?'} · restored` : undefined);
      }
    }
  } catch (e) { /* no history available */ }
}

async function loadContext() {
  try {
    const [initR, threadsR] = await Promise.all([
      fetch(API + '/init'),
      fetch(API + '/threads'),
    ]);
    const init = await initR.json();
    const threads = await threadsR.json();

    document.getElementById('status-badge').textContent = 'online';
    document.getElementById('status-badge').style.background = '#1a3a2a';

    let html = '';

    if (init.top_threads && init.top_threads.length) {
      html += '<div class="ctx-block"><h3>Threads</h3>';
      for (const t of init.top_threads) {
        const cls = t.memory_class === 'committed' ? 'committed' : 'working';
        html += `<div class="ctx-item ${cls}">
          <div>${t.title}</div>
          ${t.next_action ? `<div class="label">\u2192 ${t.next_action}</div>` : ''}
        </div>`;
      }
      html += '</div>';
    }

    if (init.unresolved_tensions && init.unresolved_tensions.length) {
      html += '<div class="ctx-block"><h3>Tensions</h3>';
      for (const u of init.unresolved_tensions) {
        html += `<div class="ctx-item tension">! ${u.thread}: ${u.issue}</div>`;
      }
      html += '</div>';
    }

    if (init.recent_movement && init.recent_movement.last_session) {
      const s = init.recent_movement.last_session;
      html += '<div class="ctx-block"><h3>Last Session</h3>';
      html += `<div class="ctx-item"><div class="label">${s.summary || 'No summary'}</div></div>`;
      html += '</div>';
    }

    if (init.best_next_action) {
      html += '<div class="ctx-block"><h3>Next Action</h3>';
      html += `<div class="ctx-item committed">${init.best_next_action}</div>`;
      html += '</div>';
    }

    if (init.committed_memory && init.committed_memory.length) {
      html += '<div class="ctx-block"><h3>Committed Memory</h3>';
      for (const m of init.committed_memory) {
        html += `<div class="ctx-item"><div style="font-size:12px">${m.text}</div></div>`;
      }
      html += '</div>';
    }

    document.getElementById('context-drawer').innerHTML = html;

    if (init.best_next_action) {
      addMessage('assistant', `Welcome back. ${init.unresolved_tensions?.length || 0} tensions active. Next: ${init.best_next_action}`);
    }
  } catch (e) {
    document.getElementById('status-badge').textContent = 'offline';
    document.getElementById('status-badge').style.background = '#3d1f20';
    document.getElementById('context-drawer').innerHTML = '<div class="ctx-item">Could not load context</div>';
  }
}

function switchDistrict(d, btn) {
  currentDistrict = d;
  document.querySelectorAll('.district-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.body.className = 'district-' + d;
  avatarLabel.textContent = d;
  addMessage('assistant', `Switched to ${d} mode.`);
}

function addMessage(role, text, meta) {
  const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let rendered;
  if (role === 'assistant' && typeof marked !== 'undefined') {
    rendered = DOMPurify.sanitize(marked.parse(text));
  } else {
    const tmp = document.createElement('span');
    tmp.textContent = text;
    rendered = tmp.innerHTML;
  }
  const metaStr = meta ? `${meta} · ${now}` : now;
  div.innerHTML = `<div class="bubble">${rendered}</div><div class="meta">${metaStr}</div>`;
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = 999999;
}

// Scroll button visibility
document.addEventListener('DOMContentLoaded', () => {
  const msgs = document.getElementById('messages');
  if (msgs) msgs.addEventListener('scroll', () => {
    const atBottom = msgs.scrollHeight - msgs.scrollTop <= msgs.clientHeight + 60;
    document.getElementById('scroll-btn').style.display = atBottom ? 'none' : 'block';
  });
});

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMessage('user', text);
  chatHistory.push({role: 'user', content: text});

  const model = currentDistrict === 'companion' ? 'helen' : `helen-${currentDistrict}`;
  const sendBtn = document.querySelector('.input-bar button');
  sendBtn.disabled = true;
  sendBtn.textContent = '...';
  input.disabled = true;

  // Avatar: thinking state + timeout recovery (P2)
  avatar.classList.add('thinking');
  avatarLabel.textContent = 'thinking...';
  const timeoutId = setTimeout(() => {
    avatarLabel.textContent = 'slow...';
    sendBtn.disabled = false;
    sendBtn.textContent = 'Retry';
    input.disabled = false;
  }, 30000);

  try {
    const r = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: model,
        messages: chatHistory.slice(-10),
        session_id: SESSION_ID,
      }),
    });
    const d = await r.json();

    // Avatar: back to resting
    clearTimeout(timeoutId);
    avatar.classList.remove('thinking');
    avatarLabel.textContent = currentDistrict;

    if (d.choices && d.choices[0]) {
      let reply = d.choices[0].message.content;
      reply = reply.replace(/^As HELEN[^.]*\.\s*/i, '');
      reply = reply.replace(/^(In |As |You are )?(companion|temple|oracle|mayor) mode[^.]*\.\s*/i, '');
      reply = reply.replace(/\[?(slow|soft|lower-pitch|exhale|breath|whisper|sigh|chuckle)\]?\s*/gi, '');
      reply = reply.replace(/^I respond:\s*/i, '');
      reply = reply.trim();
      chatHistory.push({role: 'assistant', content: reply});
      addMessage('assistant', reply, `${d.helen_provider || model} · ${d.helen_elapsed || '?'}s · authority=NONE`);
    } else if (d.error) {
      addMessage('assistant', `Error: ${d.error.message || d.error}`, 'error');
    }
  } catch (e) {
    clearTimeout(timeoutId);
    avatar.classList.remove('thinking');
    avatarLabel.textContent = currentDistrict;
    addMessage('assistant', `Connection error: ${e.message}`, 'error');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
    input.disabled = false;
    input.focus();
  }
}

loadContext();
loadChatHistory();
</script>
</body>
</html>
