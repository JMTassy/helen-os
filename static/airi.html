<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELEN OS — Companion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Pro', -apple-system, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
.header { padding: 12px 20px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; }
.header .logo { font-size: 24px; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
.header h1 { font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #ff6b4a, #e6edf3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #1a3a2a; color: #3fb950; }
.main { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 260px; border-right: 1px solid #21262d; padding: 16px; overflow-y: auto; }
.sidebar h3 { font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 8px; letter-spacing: 1px; }
.ctx-block { margin-bottom: 16px; }
.ctx-item { font-size: 13px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; }
.ctx-item.committed { border-left: 3px solid #3fb950; padding-left: 10px; }
.ctx-item.working { border-left: 3px solid #d29922; padding-left: 10px; }
.ctx-item.tension { border-left: 3px solid #f85149; padding-left: 10px; color: #f85149; }
.ctx-item .label { color: #8b949e; font-size: 11px; }
.chat-area { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.msg { margin-bottom: 16px; max-width: 80%; }
.msg.user { margin-left: auto; }
.msg.user .bubble { background: #1f6feb; border-radius: 16px 16px 4px 16px; padding: 10px 14px; }
.msg.assistant .bubble { background: #161b22; border: 1px solid #21262d; border-radius: 16px 16px 16px 4px; padding: 10px 14px; }
.msg .meta { font-size: 11px; color: #484f58; margin-top: 4px; }
.input-bar { padding: 12px 20px; border-top: 1px solid #21262d; display: flex; gap: 8px; }
.input-bar input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; color: #e6edf3; font-size: 14px; outline: none; }
.input-bar input:focus { border-color: #1f6feb; }
.input-bar button { background: #1f6feb; color: white; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 14px; }
.input-bar button:hover { background: #388bfd; }
.district-bar { display: flex; gap: 4px; margin-bottom: 12px; }
.district-btn { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; }
.district-btn.active { background: #1f6feb; color: white; border-color: #1f6feb; }
.district-btn:hover { border-color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🧠</span>
  <h1>HELEN OS</h1>
  <span class="badge" id="status-badge">connecting...</span>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="district-bar">
      <button class="district-btn active" onclick="switchDistrict('companion')">Companion</button>
      <button class="district-btn" onclick="switchDistrict('temple')">Temple</button>
      <button class="district-btn" onclick="switchDistrict('oracle')">Oracle</button>
      <button class="district-btn" onclick="switchDistrict('mayor')">Mayor</button>
    </div>
    <div id="context-drawer">Loading context...</div>
  </div>
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="Talk to HELEN..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentDistrict = 'companion';
let chatHistory = [];

async function loadContext() {
  try {
    const [initR, threadsR] = await Promise.all([
      fetch(API + '/init'),
      fetch(API + '/threads'),
    ]);
    const init = await initR.json();
    const threads = await threadsR.json();

    document.getElementById('status-badge').textContent = 'online';
    document.getElementById('status-badge').style.background = '#1a3a2a';

    let html = '';

    // Threads
    if (init.top_threads && init.top_threads.length) {
      html += '<div class="ctx-block"><h3>Threads</h3>';
      for (const t of init.top_threads) {
        const cls = t.memory_class === 'committed' ? 'committed' : 'working';
        html += `<div class="ctx-item ${cls}">
          <div>${t.title}</div>
          ${t.next_action ? `<div class="label">→ ${t.next_action}</div>` : ''}
        </div>`;
      }
      html += '</div>';
    }

    // Tensions
    if (init.unresolved_tensions && init.unresolved_tensions.length) {
      html += '<div class="ctx-block"><h3>Tensions</h3>';
      for (const u of init.unresolved_tensions) {
        html += `<div class="ctx-item tension">! ${u.thread}: ${u.issue}</div>`;
      }
      html += '</div>';
    }

    // Last session
    if (init.recent_movement && init.recent_movement.last_session) {
      const s = init.recent_movement.last_session;
      html += '<div class="ctx-block"><h3>Last Session</h3>';
      html += `<div class="ctx-item"><div class="label">${s.summary || 'No summary'}</div></div>`;
      html += '</div>';
    }

    // Next action
    if (init.best_next_action) {
      html += '<div class="ctx-block"><h3>Next Action</h3>';
      html += `<div class="ctx-item committed">${init.best_next_action}</div>`;
      html += '</div>';
    }

    // Committed memory
    if (init.committed_memory && init.committed_memory.length) {
      html += '<div class="ctx-block"><h3>Committed Memory</h3>';
      for (const m of init.committed_memory) {
        html += `<div class="ctx-item"><div style="font-size:12px">${m.text}</div></div>`;
      }
      html += '</div>';
    }

    document.getElementById('context-drawer').innerHTML = html;

    // Add greeting
    if (init.best_next_action) {
      addMessage('assistant', `Welcome back. ${init.unresolved_tensions?.length || 0} tensions active. Next: ${init.best_next_action}`);
    }
  } catch (e) {
    document.getElementById('status-badge').textContent = 'offline';
    document.getElementById('status-badge').style.background = '#3d1f20';
    document.getElementById('context-drawer').innerHTML = '<div class="ctx-item">Could not load context</div>';
  }
}

function switchDistrict(d) {
  currentDistrict = d;
  document.querySelectorAll('.district-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  addMessage('assistant', `Switched to ${d} mode.`);
}

function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div>${meta ? `<div class="meta">${meta}</div>` : ''}`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 999999;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMessage('user', text);
  chatHistory.push({role: 'user', content: text});

  const model = currentDistrict === 'companion' ? 'helen' : `helen-${currentDistrict}`;

  try {
    const r = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: model,
        messages: chatHistory.slice(-10),
      }),
    });
    const d = await r.json();

    if (d.choices && d.choices[0]) {
      let reply = d.choices[0].message.content;
      // Filter system prompt echoes
      reply = reply.replace(/^As HELEN[^.]*\.\s*/i, '');
      reply = reply.replace(/^(In |As |You are )?(companion|temple|oracle|mayor) mode[^.]*\.\s*/i, '');
      reply = reply.replace(/\[?(slow|soft|lower-pitch|exhale|breath|whisper|sigh|chuckle)\]?\s*/gi, '');
      reply = reply.replace(/^I respond:\s*/i, '');
      reply = reply.trim();
      chatHistory.push({role: 'assistant', content: reply});
      addMessage('assistant', reply, `${d.helen_provider || model} · ${d.helen_elapsed || '?'}s · authority=NONE`);
    } else if (d.error) {
      addMessage('assistant', `Error: ${d.error.message || d.error}`, 'error');
    }
  } catch (e) {
    addMessage('assistant', `Connection error: ${e.message}`, 'error');
  }
}

loadContext();
</script>
</body>
</html>
